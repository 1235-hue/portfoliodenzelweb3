<!-- Paste this into EVERY HTML file and customise the <title> and <main> -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- REQUIRED for responsive design on mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio of [denzel ochieng] — food science student at [Jomo kenyatta university of agriculture and technology]">
  <title>[denzel ochieng] | Portfolio</title>
  <link rel="stylesheet" href="%23style.css">
  <style>
    .form-message {
      padding: 1rem;
      margin-bottom: 1.5rem;
      border-radius: 8px;
      font-weight: 500;
      display: none;
    }
    .form-message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    .form-message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    .form-message.error-field {
      color: #721c24;
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }
    input:invalid, textarea:invalid {
      border-color: #721c24 !important;
    }
  </style>
</head>
<body>

  <!-- Skip link: allows keyboard users to skip the nav -->
  <a href="#main" class="skip-link">Skip to main content</a>

  <header>
    <div class="container">
      <a href="index.html" class="logo">[denzel ochieng]</a>
      <nav aria-label="Main navigation">
        <ul>
          <!-- Add class="active" to the current page's link -->
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="contact-section">
      <div class="container">
        <h2>Get In Touch</h2>
        <div id="formMessage" class="form-message"></div>
        <form class="contact-form" id="contactForm" method="POST" novalidate>

          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name"
                   placeholder="denzel ochieng" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject" name="subject" required>
              <option value="">Select a subject</option>
              <option value="Collaboration">Collaboration</option>
              <option value="Employment Opportunity">Employment Opportunity</option>
              <option value="General Enquiry">General Enquiry</option>
            </select>
          </div>

          <div class="form-group">
            <label for="msg">Message</label>
            <textarea id="msg" name="message" rows="5" placeholder="Your message here..." required></textarea>
          </div>

          <button type="submit" class="btn">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; <span id="year"></span> [denzel ochieng] — AFS 2215, Dept. of Agriculture</p>
    </div>
  </footer>

  <script>
    // Set current year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Contact Form Handler
    const contactForm = document.getElementById('contactForm');
    const formMessage = document.getElementById('formMessage');

    contactForm.addEventListener('submit', function(e) {
      e.preventDefault();

      // Get form values
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const subject = document.getElementById('subject').value.trim();
      const message = document.getElementById('msg').value.trim();

      // Simple validation
      if (!name || !email || !subject || !message) {
        showMessage('Please fill in all fields.', 'error');
        return;
      }

      // Email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showMessage('Please enter a valid email address.', 'error');
        return;
      }

      // If validation passes, show success message
      showMessage(
        `✓ Thank you, ${name}! Your message has been received. I'll get back to you soon at ${email}.`,
        'success'
      );

      // Log the data (in a real app, this would be sent to a server)
      console.log({
        name: name,
        email: email,
        subject: subject,
        message: message,
        timestamp: new Date().toISOString()
      });

      // Reset form
      contactForm.reset();

      // Hide message after 5 seconds
      setTimeout(() => {
        formMessage.style.display = 'none';
      }, 5000);
    });

    // Helper function to show messages
    function showMessage(text, type) {
      formMessage.textContent = text;
      formMessage.className = 'form-message ' + type;
      formMessage.style.display = 'block';
      
      // Scroll to message
      formMessage.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Real-time email validation feedback
    const emailInput = document.getElementById('email');
    emailInput.addEventListener('blur', function() {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (this.value && !emailRegex.test(this.value)) {
        this.style.borderColor = '#721c24';
      } else {
        this.style.borderColor = '';
      }
    });
  </script>
</body>
</html>
